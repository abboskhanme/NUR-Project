# NUR Project — Docker Compose (development)
# Ishga tushirish: docker compose up -d
# To'xtatish:      docker compose down
# Hammasini o'chirish (DB ham): docker compose down -v

# Qat'iy project nomi — volume nomi (nur-erp_postgres_data) qaysi papka/yo'ldan
# ishga tushirilsa ham o'zgarmaydi, shuning uchun baza hech qachon "adashib" yo'qolmaydi.
name: nur-erp

services:
  postgres:
    image: postgres:16-alpine
    container_name: nur-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nur_erp
      # Dev uchun — docker tarmog'i ichida parol talab qilinmaydi.
      # Prod'da bu qatorni olib tashlang va parolni .env orqali bering.
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      # Host 5433 -> container 5432. Boshqa project host'da 5432ni band qilgani uchun
      # ziddiyatdan qochamiz. Backend baribir ichki tarmoq orqali 'postgres:5432'ga
      # ulanadi — bu o'zgarish faqat hostdan ulanishga taalluqli.
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nur_erp"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nur-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/nur_erp
      SECRET_KEY: dev-secret-change-me-in-production
      DEBUG: "true"
      ALLOWED_ORIGINS_STR: "http://localhost:5173,http://127.0.0.1:5173"
      INIT_ADMIN_PHONE: "+998901234567"
      INIT_ADMIN_PASSWORD: Admin@12345
      INIT_ADMIN_NAME: Super Admin
    ports:
      # Host 8011 -> container 8000. 8000/8001/8002 boshqa projectlar yoki Windows
      # tomonidan band bo'lgani uchun tashqi port 8011 ga ko'chirildi.
      - "8011:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        echo '[init] Waiting for DB then seeding...' &&
        python -m scripts.seed &&
        echo '[init] Starting uvicorn...' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nur-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:8011/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
    # Volume nomini ANIQ belgilaymiz: eski 'nurproject' loyihasida yaratilgan va
    # sizning bazangiz turgan volume'ni qayta ishlatamiz. Endi project nomi yoki
    # papka o'zgarsa ham shu volume (va undagi baza) doimo ishlatiladi — ma'lumot
    # boshqa "adashgan" volume'da qolib ketmaydi.
    name: nurproject_postgres_data
