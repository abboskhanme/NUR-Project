# NUR Project — Docker Compose (PRODUCTION, hammasi bitta droplet ichida)
# Ishga tushirish:  docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
# To'xtatish:       docker compose -f docker-compose.prod.yml down
# Loglar:           docker compose -f docker-compose.prod.yml logs -f backend
#
# Bu fayl dev'dagi docker-compose.yml dan farq qiladi:
#   - manba kodi volume orqali ulanmaydi (image ichiga "baked"), --reload yo'q
#   - frontend nginx orqali tayyor build'ni beradi (Vite dev server emas)
#   - Caddy reverse-proxy avtomatik HTTPS (Let's Encrypt) o'rnatadi
#   - postgres ham SHU droplet ichida konteyner sifatida ishlaydi (Managed DB emas)
name: nur-erp-prod

services:
  postgres:
    image: postgres:16-alpine
    container_name: nur-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: nur_erp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"          # faqat ichki tarmoq — tashqariga ochilmaydi
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nur_erp"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nur-backend
    restart: unless-stopped
    env_file: .env.prod
    environment:
      APP_ENV: production
      DEBUG: "false"
    volumes:
      - backend_uploads:/app/uploads
    expose:
      - "8000"          # faqat ichki tarmoq — tashqariga ochilmaydi
    depends_on:
      postgres:
        condition: service_healthy
    # Har startda alembic migratsiyalari qo'llanadi (yangi ustun/jadval avtomatik
    # qo'shiladi), so'ng uvicorn ishga tushadi (reload'siz). Shu sabab git pull +
    # rebuild'dan keyin sxemani qo'lda ALTER qilish shart emas.
    command: >
      sh -c "
        echo '[init] Applying DB migrations (alembic upgrade head)...' &&
        alembic upgrade head &&
        echo '[init] Starting uvicorn (prod)...' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
      "

  # Telegram bot — backend bilan bir image, alohida jarayon (polling).
  # Mijozlar uchun sotuvchi + xo'jayinga kunlik hisobot.
  telegram-bot:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nur-telegram-bot
    restart: unless-stopped
    env_file: .env.prod
    environment:
      APP_ENV: production
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    command: ["python", "-m", "app.integrations.telegram"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: nur-frontend
    restart: unless-stopped
    expose:
      - "80"            # faqat ichki tarmoq

  caddy:
    image: caddy:2-alpine
    container_name: nur-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # .env.prod ichidagi DOMAIN qiymati Caddyfile'ga uzatiladi
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:       # baza shu volume'da saqlanadi — `down` da ham yo'qolmaydi
  backend_uploads:
  caddy_data:
  caddy_config:
