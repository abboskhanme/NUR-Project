# Frontend nginx — SPA (React Router) uchun fallback.
# /api so'rovlari bu yerga kelmaydi: ularni tashqi Caddy reverse-proxy
# to'g'ridan-to'g'ri backendga yo'naltiradi.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Statik fayllarni keshlash
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html hech qachon keshlanmasin — aks holda brauzer yangi build
    # chiqqanidan keyin ham eski JS/CSS'ga ishora qiluvchi eski index.html'ni
    # ko'rsatib turadi va foydalanuvchilar yangi funksiyalarni ko'rmay qoladi.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
        try_files $uri =404;
    }

    # React Router — har qanday yo'l index.html ga tushadi
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
